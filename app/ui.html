<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Support Assistant</title>
<style>
  :root {
    --bg: #f5f6f8; --panel: #ffffff; --border: #e3e6ea; --text: #1f2329;
    --muted: #6b7280; --user: #2563eb; --user-text: #ffffff;
    --bot: #f1f3f5; --accent: #2563eb; --warn-bg: #fff7ed; --warn-border: #fdba74;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 20px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
  #chat {
    flex: 1; overflow-y: auto; padding: 20px; max-width: 820px; width: 100%;
    margin: 0 auto;
  }
  .row { display: flex; margin-bottom: 14px; }
  .row.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 11px 14px; border-radius: 14px; line-height: 1.5;
    font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
  }
  .user .bubble { background: var(--user); color: var(--user-text); border-bottom-right-radius: 4px; }
  .bot .bubble { background: var(--bot); color: var(--text); border-bottom-left-radius: 4px; }
  .bot .bubble.escalated { background: var(--warn-bg); border: 1px solid var(--warn-border); }
  .sources { margin-top: 9px; padding-top: 8px; border-top: 1px dashed var(--border); }
  .sources .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
  .chip {
    display: inline-block; font-size: 11px; background: #fff; border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 9px; margin: 0 5px 5px 0; color: #374151; cursor: help;
  }
  .chip .tag { color: var(--accent); font-weight: 600; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .typing span {
    display: inline-block; width: 6px; height: 6px; margin-right: 3px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }
  footer {
    border-top: 1px solid var(--border); background: var(--panel); padding: 12px;
  }
  .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 8px; }
  #q {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 12px; font-size: 14px; font-family: inherit; outline: none; max-height: 120px;
  }
  #q:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 0 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <h1>Support Assistant</h1>
    <p>Answers from FAQs, product manuals, and support tickets — with sources.</p>
  </header>

  <div id="chat"></div>

  <footer>
    <div class="composer">
      <textarea id="q" rows="1" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send">Send</button>
    </div>
  </footer>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("q");
  const sendBtn = document.getElementById("send");
  const conversationId = "web-" + Math.random().toString(36).slice(2, 10);
  // Served by the API (http/https) -> same origin. Opened as a file/preview
  // -> talk to the local server explicitly.
  const API_BASE = (location.protocol.startsWith("http") && location.host)
    ? "" : "http://127.0.0.1:8000";

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  // Minimal markdown: **bold** + newlines (answers may contain bold).
  function render(text) {
    return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  function addRow(role) {
    const row = document.createElement("div");
    row.className = "row " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const bubble = addRow("bot");
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    return bubble;
  }

  function renderAnswer(bubble, data) {
    if (data.escalated) {
      bubble.classList.add("escalated");
      bubble.innerHTML = render(data.message || "This has been routed to a human.")
        + '<div class="meta">Escalated to a human' +
        (data.escalation_id ? " · ticket #" + data.escalation_id : "") + "</div>";
      return;
    }
    let html = render(data.answer || "");
    if (data.citations && data.citations.length) {
      html += '<div class="sources"><div class="label">Sources</div>';
      const seen = new Set();
      for (const c of data.citations) {
        const key = c.doc_id + "|" + (c.title || "");
        if (seen.has(key)) continue;
        seen.add(key);
        const tip = (c.cited_text || "").replace(/\s+/g, " ").trim();
        html += '<span class="chip" title="' + escapeHtml(tip) + '">'
          + '<span class="tag">' + escapeHtml(c.source_type || "doc") + '</span> '
          + escapeHtml(c.title || c.doc_id || "source") + "</span>";
      }
      html += "</div>";
    }
    if (typeof data.confidence === "number") {
      html += '<div class="meta">confidence ' + data.confidence.toFixed(2) + "</div>";
    }
    bubble.innerHTML = html;
  }

  async function send() {
    const question = input.value.trim();
    if (!question) return;
    input.value = "";
    input.style.height = "auto";
    addRow("user").textContent = question;
    sendBtn.disabled = true;
    const bubble = showTyping();
    try {
      const res = await fetch(API_BASE + "/query", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ question, conversation_id: conversationId }),
      });
      const data = await res.json();
      renderAnswer(bubble, data);
    } catch (e) {
      bubble.classList.add("escalated");
      bubble.textContent = "Something went wrong reaching the server. Please try again.";
    } finally {
      sendBtn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
  input.focus();
</script>
</body>
</html>
